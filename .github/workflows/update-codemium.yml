name: Update codemium formula

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.11.0)'
        required: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update formula
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          curl -sL "https://github.com/dsablic/codemium/releases/download/v${VERSION}/checksums.txt" -o checksums.txt

          SHA_DARWIN_ARM64=$(grep "codemium_Darwin_arm64.tar.gz" checksums.txt | awk '{print $1}')
          SHA_DARWIN_AMD64=$(grep "codemium_Darwin_x86_64.tar.gz" checksums.txt | awk '{print $1}')
          SHA_LINUX_ARM64=$(grep "codemium_Linux_arm64.tar.gz" checksums.txt | awk '{print $1}')
          SHA_LINUX_AMD64=$(grep "codemium_Linux_x86_64.tar.gz" checksums.txt | awk '{print $1}')

          mkdir -p Formula
          cat > Formula/codemium.rb << FORMULA
          class Codemium < Formula
            desc "Generate code statistics across Bitbucket and GitHub repositories"
            homepage "https://github.com/dsablic/codemium"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/dsablic/codemium/releases/download/v${VERSION}/codemium_Darwin_arm64.tar.gz"
                sha256 "${SHA_DARWIN_ARM64}"
              else
                url "https://github.com/dsablic/codemium/releases/download/v${VERSION}/codemium_Darwin_x86_64.tar.gz"
                sha256 "${SHA_DARWIN_AMD64}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/dsablic/codemium/releases/download/v${VERSION}/codemium_Linux_arm64.tar.gz"
                sha256 "${SHA_LINUX_ARM64}"
              else
                url "https://github.com/dsablic/codemium/releases/download/v${VERSION}/codemium_Linux_x86_64.tar.gz"
                sha256 "${SHA_LINUX_AMD64}"
              end
            end

            def install
              bin.install "codemium"
            end

            test do
              assert_match "codemium", shell_output("#{bin}/codemium --version")
            end
          end
          FORMULA

          # Fix indentation (remove leading spaces from heredoc)
          sed -i 's/^          //' Formula/codemium.rb
          rm checksums.txt

      - name: Commit and push
        uses: ./.github/actions/commit-and-push
        with:
          file: Formula/codemium.rb
          message: "Update codemium to ${{ github.event.inputs.version }}"
          skip-if-no-changes: 'true'
